spring:
  application:
    name: api-produtos
  datasource:
    url: jdbc:mysql://${SPRING_DATASOURCE_URL:mysql:3306/produtos}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${SPRING_DATASOURCE_USERNAME:produtos}
    password: ${SPRING_DATASOURCE_PASSWORD:produtos123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    show-commons: true
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

