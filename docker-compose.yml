version: '3.8'

services:
  mysql:
    image: mysql
    container_name: mysql-produtos
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: produtos
      MYSQL_USER: produtos
      MYSQL_PASSWORD: produtos123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 5

  api-produtos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-produtos
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/produtos
      SPRING_DATASOURCE_USERNAME: produtos
      SPRING_DATASOURCE_PASSWORD: produtos123
    ports:
      - "8080:8080"
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
